<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no"
    />
    <title>Глассморфизм Блоки</title>
    <style>
      @font-face {
        font-family: TT;
        src: url(TT-Paplane-Regular.ttf);
      }
      * {
        font-family: TT;
        letter-spacing: 1px;
        -webkit-touch-callout: none; /* iOS Safari */
        -webkit-user-select: none; /* Safari */
        -khtml-user-select: none; /* Konqueror HTML */
        -moz-user-select: none; /* Old versions of Firefox */
        -ms-user-select: none; /* Internet Explorer/Edge */
        user-select: none;

        touch-action: none;
        user-select: none;
      }
      body {
        margin: 0;
        padding: 0;
        background: url(back.png);
        color: white;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      h1 {
        font-size: 60px;
      }

      .container {
        display: flex;
        width: 1600px;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 100px;
        justify-content: space-between;
        margin-top: 20px;
      }

      .block {
        width: 700px;
        height: 400px;
        border-radius: 15px;

        display: flex;
        justify-content: center;
        align-items: center;

        cursor: pointer;
      }
      #magicParticles {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0; /* важно: под UI */
        pointer-events: none; /* не мешает кликам */
      }

      /* твой основной UI должен быть выше */
      .app,
      .main,
      .wrapper {
        position: relative;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <canvas id="magicParticles"></canvas>
    <div class="container">
      <div class="block one"></div>

      <div class="block two"></div>
      <div class="block three"></div>

      <div class="block four"></div>
    </div>
    <script>
      window.addEventListener("mousewheel", function (e) {
        if (e.ctrlKey) {
          e.preventDefault();
          return false;
        }
      });
      document.addEventListener(
        "touchstart",
        (e) => {
          // Если используется более одного пальца
          if (e.touches.length > 1) {
            e.preventDefault(); // Отключаем действие по умолчанию
          }
        },
        { passive: false },
      ); // { passive: false } важно для предотвращения поведения по умолчанию
      document.addEventListener(
        "touchmove",
        (e) => {
          if (e.touches.length > 1) {
            e.preventDefault(); // Отключаем зумирование двумя пальцами
          }
        },
        { passive: false },
      ); // { passive: false } важно для отмены действия по умолчанию
      document.addEventListener("click", (e) => {
        let target = e.target;
        console.log(target);
        if (target.classList.contains("one")) {
          window.location.href =
            "https://maxim-prog292.github.io/Help_Vasilisa/";
        } else if (target.classList.contains("two")) {
          window.location.href =
            "https://maxim-prog292.github.io/tale-reality/";
        } else if (target.classList.contains("three")) {
          window.location.href = "https://maxim-prog292.github.io/YagaNinja/";
        } else if (target.classList.contains("four")) {
          window.location.href = "https://maxim-prog292.github.io/tale-Map/";
        }
      });
      const canvas = document.getElementById("magicParticles");
      const ctx = canvas.getContext("2d");

      let particles = [];
      const PARTICLE_COUNT = 120;

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      class Particle {
        constructor() {
          this.reset();
        }

        reset() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;

          this.size = Math.random() * 2 + 0.5;

          this.speedX = (Math.random() - 0.5) * 0.3;
          this.speedY = Math.random() * -0.5 - 0.2;

          this.opacity = Math.random() * 0.5 + 0.3;

          this.twinkle = Math.random() * 0.02;
        }

        update() {
          this.x += this.speedX;
          this.y += this.speedY;

          // мерцание
          this.opacity += Math.sin(Date.now() * this.twinkle) * 0.005;

          // если улетела вверх — возвращаем вниз
          if (this.y < 0) {
            this.reset();
            this.y = canvas.height;
          }

          // легкий "дрейф"
          if (this.x < 0 || this.x > canvas.width) {
            this.speedX *= -1;
          }
        }

        draw() {
          ctx.beginPath();

          const gradient = ctx.createRadialGradient(
            this.x,
            this.y,
            0,
            this.x,
            this.y,
            this.size * 4,
          );

          gradient.addColorStop(0, `rgba(255, 223, 100, ${this.opacity})`);
          gradient.addColorStop(
            0.5,
            `rgba(255, 200, 50, ${this.opacity * 0.6})`,
          );
          gradient.addColorStop(1, `rgba(255, 200, 50, 0)`);

          ctx.fillStyle = gradient;
          ctx.arc(this.x, this.y, this.size * 4, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // инициализация
      function init() {
        particles = [];
        for (let i = 0; i < PARTICLE_COUNT; i++) {
          particles.push(new Particle());
        }
      }

      // рендер
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        particles.forEach((p) => {
          p.update();
          p.draw();
        });

        requestAnimationFrame(animate);
      }

      init();
      animate();
    </script>
  </body>
</html>
